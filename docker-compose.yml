services:
  app:
    profiles: ["prod"]          # ✅ ne démarre qu'avec --profile prod
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"

  app-dev:
    profiles: ["dev"]           # ✅ ne démarre qu'avec --profile dev
    image: oven/bun:1
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    command: >
      sh -c "
        bun install &&
        bunx prisma generate &&
        bunx prisma migrate deploy &&
        bun run dev
      "
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app-node-modules:/app/node_modules
      - app-next-cache:/app/.next
    stdin_open: true
    tty: true

volumes:
  app-node-modules:
  app-next-cache:
